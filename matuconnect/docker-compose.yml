services:
  postgres:
    image: ghcr.io/payloadcms/postgis-vector:latest
    container_name: matuconnect-db
    environment:
      POSTGRES_DB: matuconnect
      POSTGRES_USER: matuconnectuser
      POSTGRES_PASSWORD: matuconnectpassword
    ports:
      - "5432:5432"
    volumes:
      - matuconnect-pgdata:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matuconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  matuconnect-pgdata: