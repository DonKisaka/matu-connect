spring.application.name=matuconnect

spring.datasource.url=jdbc:postgresql://localhost:5432/matuconnect
spring.datasource.username=matuconnectuser
spring.datasource.password=matuconnectpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-haiku-4-5-20251001
spring.ai.anthropic.chat.temperature=0.3

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.embedding.model=nomic-embed-text

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=768

server.port=8080

logging.level.com.matuconnect=DEBUG
logging.level.org.springframework.ai=INFO
